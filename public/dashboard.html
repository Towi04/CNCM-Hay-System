<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CNCM - Panel de Control</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --cncm-blue-dark: #0D264A;
            --cncm-blue-light: #11458B;
            --cncm-red: #FF0000;
        }
        .navbar { background-color: var(--cncm-blue-dark); }
        .btn-cncm { background-color: var(--cncm-red); color: white; }
        .card-header-cncm { background-color: var(--cncm-blue-light); color: white; }
    </style>
</head>
<body class="bg-light">
    <nav class="navbar navbar-dark p-3">
        <div class="container-fluid">
            <span class="navbar-brand mb-0 h1">CNCM - Sistema de Evaluación Hay</span>
            <span class="text-white">Bienvenido, <span id="user-name">Coordinador</span></span>
        </div>
    </nav>

    <div class="container mt-5">
        <div class="row">
            <div class="col-md-12 mb-4">
                <div class="card shadow">
                    <div class="card-header card-header-cncm">
                        <h5>Evaluación de Personal (Computación / Inglés)</h5>
                    </div>
                    <div class="card-body">
                        <p>Ingresa el número de empleado o ID para verificar si es personal activo o un nuevo ingreso.</p>
                        <form id="searchForm" class="row g-3">
                            <div class="col-md-8">
                                <input type="text" id="empId" class="form-control form-control-lg" placeholder="ID de Empleado (Ej: 2026001)" required>
                            </div>
                            <div class="col-md-4">
                                <button type="submit" class="btn btn-cncm btn-lg w-100">Consultar / Registrar</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>

        <div id="resultArea" class="row d-none">
            <div class="col-md-12">
                <div class="alert alert-info" id="statusMessage"></div>
                </div>
        </div>
    </div>
</body>
</html>
