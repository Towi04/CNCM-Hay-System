<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - CNCM Hay System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <style>
        :root {
            --sidebar-width: 250px;
            --cncm-blue-dark: #0D264A;
            --cncm-blue-light: #11458B;
            --cncm-red: #FF0000;
        }

        body {
            background-color: #f8f9fa;
            overflow-x: hidden;
        }

        /* --- Barra Superior (Navbar) --- */
        .navbar {
            background-color: white;
            border-bottom: 2px solid var(--cncm-blue-dark);
            z-index: 1050;
        }

        .navbar-brand img {
            height: 40px;
        }

        .plantel-badge {
            background-color: var(--cncm-blue-light);
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.9rem;
        }

        /* --- Menú Lateral (Sidebar) --- */
        #sidebar {
            width: var(--sidebar-width);
            height: 100vh;
            position: fixed;
            left: 0;
            top: 0;
            padding-top: 70px; /* Espacio para la navbar */
            background-color: var(--cncm-blue-dark);
            color: white;
            transition: all 0.3s;
            z-index: 1000;
        }

        #sidebar.active {
            margin-left: calc(var(--sidebar-width) * -1);
        }

        .nav-link {
            color: rgba(255,255,255,0.8);
            padding: 12px 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .nav-link:hover, .nav-link.active {
            color: white;
            background-color: var(--cncm-blue-light);
        }

        /* --- Contenido Principal --- */
        #content {
            width: 100%;
            padding: 90px 20px 20px 20px;
            margin-left: var(--sidebar-width);
            transition: all 0.3s;
        }

        #content.active {
            margin-left: 0;
        }

        /* Ajustes para Tablets */
        @media (max-width: 992px) {
            #sidebar { margin-left: calc(var(--sidebar-width) * -1); }
            #sidebar.active { margin-left: 0; }
            #content { margin-left: 0; }
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg fixed-top shadow-sm">
        <div class="container-fluid">
            <button type="button" id="sidebarCollapse" class="btn btn-outline-dark me-2">
                <i class="bi bi-list"></i>
            </button>
            
            <a class="navbar-brand me-auto" href="#">
                <img src="assets/logo horizontal fondo transparente.png" alt="CNCM">
            </a>

            <div class="d-flex align-items-center gap-3">
                <span class="plantel-badge d-none d-md-block">
                    <i class="bi bi-geo-alt-fill"></i> Plantel: Salamanca
                </span>

                <div class="dropdown">
                    <a href="#" class="d-flex align-items-center text-dark text-decoration-none dropdown-toggle" id="userMenu" data-bs-toggle="dropdown">
                        <span class="me-2 d-none d-sm-inline">Juan Pérez</span>
                        <img src="https://ui-avatars.com/api/?name=Juan+Perez&background=0D264A&color=fff" alt="Avatar" width="32" height="32" class="rounded-circle">
                    </a>
                    <ul class="dropdown-menu dropdown-menu-end shadow">
                        <li><h6 class="dropdown-header">Mi Cuenta</h6></li>
                        <li><a class="dropdown-item" href="#"><i class="bi bi-person me-2"></i>Ver Información</a></li>
                        <li><a class="dropdown-item" href="#"><i class="bi bi-key me-2"></i>Cambiar Contraseña</a></li>
                        <li><hr class="dropdown-divider"></li>
                        <li><a class="dropdown-item text-danger" href="index.html"><i class="bi bi-box-arrow-right me-2"></i>Cerrar Sesión</a></li>
                    </ul>
                </div>
            </div>
        </div>
    </nav>

    <nav id="sidebar">
        <div class="list-group list-group-flush">
            <a href="#" class="nav-link active"><i class="bi bi-speedometer2"></i> Dashboard</a>
            <a href="#" class="nav-link"><i class="bi bi-folder"></i> Menú 1</a>
            <a href="#" class="nav-link"><i class="bi bi-people"></i> Menú 2</a>
            <a href="#" class="nav-link"><i class="bi bi-file-earmark-text"></i> Menú 3</a>
            <a href="#" class="nav-link"><i class="bi bi-calendar-event"></i> Menú 4</a>
            <a href="#" class="nav-link"><i class="bi bi-clipboard-data"></i> Menú 5</a>
            <a href="#" class="nav-link"><i class="bi bi-gear"></i> Menú 6</a>
            <a href="#" class="nav-link"><i class="bi bi-shield-check"></i> Menú 7</a>
            <a href="#" class="nav-link"><i class="bi bi-question-circle"></i> Menú 8</a>
        </div>
    </nav>

    <div id="content">
        <div class="container-fluid">
            <h2>Bienvenido al Sistema de Administración</h2>
            <p>Selecciona una opción del menú lateral para comenzar.</p>
            
            <div class="row mt-4">
                <div class="col-md-3 mb-3">
                    <div class="card border-0 shadow-sm p-3">
                        <h6 class="text-muted">Alumnos Activos</h6>
                        <h3>1,250</h3>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        $(document).ready(function () {
            $('#sidebarCollapse').on('click', function () {
                $('#sidebar, #content').toggleClass('active');
            });
        });
    </script>
</body>
</html>
