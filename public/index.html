<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CNCM Hay System - Login Institucional</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        :root {
            --cncm-blue-dark: #0D264A;
            --cncm-blue-light: #11458B;
            --cncm-red: #FF0000;
        }

        body {
            background-color: var(--cncm-blue-dark);
            height: 100vh;
        }

        .card {
            border: none;
            border-radius: 15px;
        }

        .card-title {
            color: var(--cncm-blue-light);
            font-weight: bold;
        }
        
        /* Estilo para el logo */
.logo-cncm {
    width: 100%;       /* Ocupará todo el ancho disponible del contenedor */
    max-width: 320px;  /* Pero no crecerá más de 320px para no verse gigante */
    height: auto;      /* Mantiene la proporción original */
    margin-bottom: 25px;
    filter: drop-shadow(0px 4px 4px rgba(0,0,0,0.1)); /* Un toque de sombra para que resalte */
}
    </style>
</head>
<body class="d-flex align-items-center justify-content-center">

    <div class="card shadow-lg p-4" style="width: 100%; max-width: 400px;">
        <div class="card-body text-center">
            
            <img src="assets/logo horizontal fondo transparente.png" alt="Logo CNCM" class="logo-cncm">
            
            <h3 class="card-title text-center mb-4">Administración</h3>
            
            <form>
                <div class="mb-3 text-start">
                    <label for="email" class="form-label">Correo Institucional</label>
                    <input type="email" class="form-control" id="email" placeholder="tu.correo@cncm.edu.mx" required>
                </div>
                <div class="mb-3 text-start">
                    <label for="password" class="form-label">Contraseña</label>
                    <input type="password" class="form-control" id="password" placeholder="********" required>
                </div>
                <div class="d-grid gap-2">
                    <button type="submit" class="btn btn-danger" style="background-color: var(--cncm-red);">Iniciar Sesión</button>
                </div>
            </form>
            
            <div class="mt-3 text-center">
                <a href="#" class="text-muted small">¿Olvidaste tu contraseña?</a>
            </div>
        </div>
    </div>

</body>
</html>
