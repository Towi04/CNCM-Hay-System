<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CNCM Hay System - Login Institucional</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        :root {
            /* Definimos los colores institucionales como variables */
            --cncm-blue-dark: #0D264A;   
            --cncm-blue-light: #11458b;  
            --cncm-red: #FF0000;         
        }

        /* Usamos el azul oscuro para el fondo de la página */
        body {
            background-color: var(--cncm-blue-dark);
            height: 100vh;
        }

        /* Personalizamos la tarjeta de login */
        .card {
            border: none;
            border-radius: 15px;
        }

        /* Título del sistema en el azul más claro */
        .card-title {
            color: var(--cncm-blue-light);
            font-weight: bold;
        }

        /* Botón principal usando el rojo de la escuela */
        .btn-primary {
            background-color: var(--cncm-red);
            border-color: var(--cncm-red);
        }

        /* Efecto al pasar el mouse sobre el botón (un rojo más oscuro) */
        .btn-primary:hover {
            background-color: #cc0000;
            border-color: #cc0000;
        }

        /* Personalización de los campos de texto al seleccionarlos */
        .form-control:focus {
            border-color: var(--cncm-blue-light);
            box-shadow: 0 0 0 0.25rem rgba(17, 69, 88, 0.25);
        }
    </style>
</head>
<body class="d-flex align-items-center">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card shadow-lg p-4">
                    <div class="card-body">
                        <h2 class="text-center card-title mb-2">SISTEMA HAY</h2>
                        <h5 class="text-center text-muted mb-4">CNCM</h5>
                        
                        <form action="/login" method="POST">
                            <div class="mb-3">
                                <label class="form-label text-secondary">Correo Institucional</label>
                                <input type="email" name="correo" class="form-control form-control-lg" required placeholder="tu.correo@escuela.edu">
                            </div>
                            
                            <div class="mb-4">
                                <label class="form-label text-secondary">Contraseña</label>
                                <input type="password" name="password" class="form-control form-control-lg" required placeholder="••••••••">
                            </div>
                            
                            <button type="submit" class="btn btn-primary btn-lg w-100 p-3 fs-5">
                                Iniciar Sesión
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
